<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusyBeds - Briefly Updating</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; padding: 2rem; }
        .logo { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
        .logo span { color: #3b82f6; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 1.5rem; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #334155;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .countdown { color: #3b82f6; font-size: 1.2rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Busy<span>Beds</span></div>
        <div class="spinner"></div>
        <h1>We're briefly updating</h1>
        <p>Improving your experience — back in just a moment!</p>
        <p class="countdown">Auto-refreshing in <span id="seconds">5</span>s...</p>
    </div>
    <script>
        let sec = 5;
        const el = document.getElementById("seconds");
        const timer = setInterval(() => {
            sec--;
            el.textContent = sec;
            if (sec <= 0) {
                clearInterval(timer);
                window.location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
